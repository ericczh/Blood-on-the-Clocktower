<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{% block title %}血染钟楼 · 说书人助手{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .type-townsfolk { color: #4a9eff; border-color: #4a9eff; }
  .type-outsider  { color: #22c55e; border-color: #22c55e; }
  .type-minion    { color: #f97316; border-color: #f97316; }
  .type-demon     { color: #ef4444; border-color: #ef4444; }
  .type-traveller { color: #a855f7; border-color: #a855f7; }
  .type-fabled    { color: #eab308; border-color: #eab308; }
  .bg-type-townsfolk { background: rgba(74,158,255,0.15); }
  .bg-type-outsider  { background: rgba(34,197,94,0.15); }
  .bg-type-minion    { background: rgba(249,115,22,0.15); }
  .bg-type-demon     { background: rgba(239,68,68,0.15); }
  .card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; }
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: #4f46e5; color: white; } .btn-primary:hover { background: #4338ca; }
  .btn-danger  { background: #dc2626; color: white; } .btn-danger:hover { background: #b91c1c; }
  .btn-ghost   { background: #2a2a3e; color: #ccc; }  .btn-ghost:hover { background: #333350; }
  .input { background: #1e1e30; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; width: 100%; font-size: 14px; }
  .input:focus { outline: none; border-color: #4f46e5; }
  select.input { appearance: auto; }
  .char-token { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid #444; background: #222; }
  .char-token-sm { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #444; background: #222; transition: transform 0.2s; }
  .char-token-sm:hover { transform: scale(2.5); z-index: 10; position: relative; }
  .nav { display: flex; gap: 8px; padding: 12px 16px; background: #12121f; border-bottom: 1px solid #2a2a3e; position: sticky; top: 0; z-index: 50; }
  .nav a { color: #888; font-size: 14px; padding: 6px 12px; border-radius: 6px; text-decoration: none; }
  .nav a:hover, .nav a.active { color: #fff; background: #2a2a3e; }
  .flash-msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; }
  .flash-success { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .flash-error   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .flash-info    { background: rgba(74,158,255,0.15); color: #60a5fa; border: 1px solid rgba(74,158,255,0.3); }
</style>
{% block head %}{% endblock %}
</head>
<body class="min-h-screen">
<nav class="nav">
  <a href="/" class="{% if request.path == '/' %}active{% endif %}">首页</a>
  <a href="/character/" class="{% if '/character' in request.path %}active{% endif %}">角色库</a>
  <a href="/script/" class="{% if '/script' in request.path %}active{% endif %}">板子管理</a>
</nav>
<main class="{% block main_class %}max-w-2xl{% endblock %} mx-auto px-4 py-6">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="mb-4 space-y-2">
        {% for category, message in messages %}
        <div class="flash-msg flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
